name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Syntax parse check
        shell: pwsh
        run: |
          $files = (Get-ChildItem -Path . -Filter *.ps1 -File).FullName
          Write-Host "Parsing: $($files -join ', ')"
          $failed = $false
          foreach ($f in $files) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f), [ref]$null, [ref]$errors) | Out-Null
            if ($errors) {
              $errors | ForEach-Object { Write-Host "::error::$f L$($_.Extent.StartLineNumber): $($_.Message)" }
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host 'Parse OK'

      - name: Install Pester & PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Force

      - name: PSScriptAnalyzer (fail on errors only)
        shell: pwsh
        run: |
          $files = (Get-ChildItem -Path . -Filter *.ps1 -File).FullName
          $r = $files | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Severity Error }
          if ($r) { $r | Format-Table -AutoSize | Out-String | Write-Host; Write-Error 'ScriptAnalyzer found error-level issues'; exit 1 }
          Write-Host 'No analyzer errors'

      - name: Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg
